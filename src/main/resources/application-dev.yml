server:
  port: ${MCP_GATEWAY_SERVER_PORT:${SERVER_PORT:8092}}

spring:
  threads:
    virtual:
      enabled: true

  r2dbc:
    url: ${MCP_GATEWAY_R2DBC_URL:${APP_R2DBC_URL:r2dbc:postgresql://localhost:5442/ai_rag_platform?schema=mcp_gateway}}
    username: ${MCP_GATEWAY_DB_USERNAME:${APP_DATASOURCE_USERNAME:postgres}}
    password: ${MCP_GATEWAY_DB_PASSWORD:${APP_DATASOURCE_PASSWORD:123456}}

  flyway:
    url: ${MCP_GATEWAY_JDBC_URL:${APP_DATASOURCE_URL:jdbc:postgresql://localhost:5442/ai_rag_platform}}
    user: ${MCP_GATEWAY_DB_USERNAME:${APP_DATASOURCE_USERNAME:postgres}}
    password: ${MCP_GATEWAY_DB_PASSWORD:${APP_DATASOURCE_PASSWORD:123456}}

logging:
  level:
    "[com.silver.ai.mcpgateway]": DEBUG

app:
  mcp:
    session:
      store-type: ${MCP_GATEWAY_SESSION_STORE_TYPE:${APP_MCP_SESSION_STORE_TYPE:redis}}

redis:
  sdk:
    config:
      host: ${MCP_GATEWAY_REDIS_HOST:${APP_REDIS_HOST:localhost}}
      port: ${MCP_GATEWAY_REDIS_PORT:${APP_REDIS_PORT:6379}}
      password: ${MCP_GATEWAY_REDIS_PASSWORD:${APP_REDIS_PASSWORD:}}
