services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: flux-mcp-postgres
    environment:
      POSTGRES_DB: ai_rag_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5442:5432"
    volumes:
      - flux_mcp_pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flux-mcp-redis
    ports:
      - "6399:6379"
    volumes:
      - flux_mcp_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  flux-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: standalone-flux-mcp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLUX_MCP_PROFILES_ACTIVE: dev
      FLUX_MCP_SERVER_PORT: 8092
      FLUX_MCP_R2DBC_URL: r2dbc:postgresql://postgres:5432/ai_rag_platform?schema=flux_mcp
      FLUX_MCP_JDBC_URL: jdbc:postgresql://postgres:5432/ai_rag_platform
      FLUX_MCP_DB_USERNAME: postgres
      FLUX_MCP_DB_PASSWORD: 123456
      FLUX_MCP_SESSION_STORE_TYPE: redis
      FLUX_MCP_REDIS_HOST: redis
      FLUX_MCP_REDIS_PORT: 6379
    ports:
      - "8092:8092"

volumes:
  flux_mcp_pgdata:
  flux_mcp_redis: