services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mcp-gateway-postgres
    environment:
      POSTGRES_DB: ai_rag_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5442:5432"
    volumes:
      - mcp_gateway_pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mcp-gateway-redis
    ports:
      - "6399:6379"
    volumes:
      - mcp_gateway_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mcp-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: standalone-mcp-gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MCP_GATEWAY_PROFILES_ACTIVE: dev
      MCP_GATEWAY_SERVER_PORT: 8092
      MCP_GATEWAY_R2DBC_URL: r2dbc:postgresql://postgres:5432/ai_rag_platform?schema=mcp_gateway
      MCP_GATEWAY_JDBC_URL: jdbc:postgresql://postgres:5432/ai_rag_platform
      MCP_GATEWAY_DB_USERNAME: postgres
      MCP_GATEWAY_DB_PASSWORD: 123456
      MCP_GATEWAY_SESSION_STORE_TYPE: redis
      MCP_GATEWAY_REDIS_HOST: redis
      MCP_GATEWAY_REDIS_PORT: 6379
    ports:
      - "8092:8092"

volumes:
  mcp_gateway_pgdata:
  mcp_gateway_redis: